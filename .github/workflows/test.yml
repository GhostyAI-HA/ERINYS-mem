name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install from wheel (isolated) and smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          # `erinys doctor` exits non-zero when no DB exists yet (expected on a
          # fresh install); assert the core runtime checks pass instead.
          /tmp/smoke/bin/erinys doctor --json | tee /tmp/doctor.json || true
          /tmp/smoke/bin/python - <<'PY'
          import json
          checks = json.load(open("/tmp/doctor.json"))["data"]["checks"]
          for name in ("sqlite", "sqlite_vec", "dependencies"):
              assert checks[name]["status"] == "ok", (name, checks[name])
          print("smoke ok:", {k: v["status"] for k, v in checks.items()})
          PY
